services:
  ecommerceserver:
    image: ecommerceserver
    build:
      context: ecommerce-app/server
      dockerfile: ./Dockerfile
    environment:
      NODE_ENV: development
    ports:
      - 3000:3000
      - 5000:5000
      - 8000:8000
      - 9229:9229
    command: ["node", "--inspect=0.0.0.0:9229", "server.js"]
